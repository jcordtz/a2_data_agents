[postgres]
# PostgreSQL Database Connection Parameters
host = localhost
port = 5432
database = postgres

# Authentication
username = postgres
password = your_password

# Optional: Schema to use (defaults to 'public' if not specified)
schema = public

# Connection pool settings (optional)
min_connections = 1
max_connections = 5

# Language/Country for natural language descriptions
# Supported: US (English), DK (Danish), FR (French), ES (Spanish), 
#            NL (Dutch), IT (Italian), PT (Portuguese), JP (Japanese),
#            CN (Chinese), KR (Korean), DE (German), etc.
country = US

# Optional: SSL mode (disable, allow, prefer, require, verify-ca, verify-full)
# sslmode = prefer

# Optional: Application name for connection identification
# application_name = data_agent
