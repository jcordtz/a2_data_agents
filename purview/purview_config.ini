# =============================================================================
# Microsoft Purview Configuration
# =============================================================================
# Configuration file for connecting to Microsoft Purview Data Governance.
#
# AUTHENTICATION:
# The module supports two authentication methods:
#   1. Service Principal (client_id, client_secret, tenant_id)
#   2. DefaultAzureCredential (uses environment variables, managed identity, etc.)
#
# Set auth_method to either "service_principal" or "default_credential"
# =============================================================================

[purview]
# Purview account name (required)
# This is the name of your Purview account without the full URL
account_name = your-purview-account

# Azure tenant ID (required)
tenant_id = your-tenant-id

# Authentication method: "service_principal" or "default_credential"
auth_method = service_principal

# Service Principal credentials (required if auth_method = service_principal)
client_id = your-client-id
client_secret = your-client-secret

# Collection name for organizing assets (optional)
# If not specified, defaults to the root collection
collection_name = 

[database]
# Database type for Purview asset classification
# Options: oracle, mssql, postgres, mysql, db2
database_type = oracle

# Database server information for constructing qualified names
# These are used to create the fully qualified name in Purview catalog
server_host = your-database-host
server_port = 1521
service_name = ORCL

[options]
# Whether to create the asset if it doesn't exist in Purview
create_if_not_exists = true

# Whether to update existing assets with new metadata
update_existing = true

# Enable verbose logging
verbose = false

# Classification labels to apply (comma-separated)
# Example: Confidential,PII,Financial
default_classifications = 
