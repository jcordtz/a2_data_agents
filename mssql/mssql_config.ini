[mssql]
# Microsoft SQL Server Connection Parameters
host = localhost
port = 1433
database = master

# Authentication
# Use either SQL authentication (username/password) or Windows authentication (trusted_connection)
username = sa
password = your_password

# Set to True to use Windows/Integrated authentication instead of SQL authentication
# trusted_connection = True

# Optional: Schema to use (defaults to 'dbo' if not specified)
schema = dbo

# Connection pool settings (optional)
min_connections = 1
max_connections = 5

# Language/Country for natural language descriptions
# Supported: US (English), DK (Danish), FR (French), ES (Spanish), 
#            NL (Dutch), IT (Italian), PT (Portuguese), JP (Japanese),
#            CN (Chinese), KR (Korean), DE (German), etc.
country = US

# Optional: ODBC Driver name (defaults to ODBC Driver 18 for SQL Server)
# driver = ODBC Driver 18 for SQL Server

# Optional: Encrypt connection (defaults to True for newer drivers)
# encrypt = True

# Optional: Trust server certificate (set to True for self-signed certs)
# trust_server_certificate = True
