# =============================================================================
# Microsoft Purview Configuration
# =============================================================================
# Configuration file for connecting to Microsoft Purview Data Governance.
#
# This file only contains settings needed to establish a connection to Purview.
# Database-specific information (host, port, database type) is passed directly
# to the API when registering assets.
#
# AUTHENTICATION:
# Uses Service Principal authentication with client_id and client_secret.
# All fields in this file are required.
# =============================================================================

[purview]
# Purview account name (required)
# This is the name of your Purview account without the full URL
account_name = your-purview-account

# Azure tenant ID (required)
tenant_id = your-tenant-id

# Service Principal credentials (required)
client_id = your-client-id
client_secret = your-client-secret
