[ibmdb2]
# IBM DB2 LUW (Linux, Unix, Windows) Connection Parameters
host = localhost
port = 50000
database = sample

# Authentication
username = db2inst1
password = your_password

# Optional: Schema to use (defaults to username if not specified)
schema = 

# Connection pool settings (optional)
min_connections = 1
max_connections = 5

# Language/Country for natural language descriptions
# Supported: US (English), DK (Danish), FR (French), ES (Spanish), 
#            NL (Dutch), IT (Italian), PT (Portuguese), JP (Japanese),
#            CN (Chinese), KR (Korean), DE (German), etc.
country = US

# Optional: Security settings
# ssl = True
# ssl_client_keydb = /path/to/keydb.kdb
# ssl_client_stash = /path/to/keydb.sth

# Optional: Connection protocol (TCPIP, LOCAL)
# protocol = TCPIP
